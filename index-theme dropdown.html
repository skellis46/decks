<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI &amp; LLM Use in PGR Research · C-DaRE</title>

  <!--
    This index.html never needs editing again — all slide content lives in
    slides.md (in the same folder). Edit that file and refresh the browser.

    IMPORTANT: loading an external .md file uses fetch(), which browsers BLOCK
    when you double-click a file (file://). You must serve the folder over a
    local web server. From this folder, run ONE of:

        python3 -m http.server        # then open http://localhost:8000
        npx serve                     # then open the URL it prints

    (Or use VS Code's "Live Server" extension.)

    Theme: use the dropdown in the bottom-right corner to switch themes live.
  -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/black.css" id="theme">

  <style>
    #theme-switcher {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 1000;
      font-family: sans-serif;
      font-size: 12px;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    #theme-switcher:hover { opacity: 1; }
    #theme-switcher select {
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid #888;
      background: #222;
      color: #eee;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="reveal">
    <div class="slides">
      <!-- All slides come from slides.md.
           "---" on its own line = new slide.   "Note:" = speaker notes. -->
      <section data-markdown="slides.md"
               data-separator="\r?\n---\r?\n"
               data-separator-vertical="\r?\n----\r?\n"
               data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/highlight.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      plugins: [ RevealMarkdown, RevealNotes, RevealHighlight ]
    });
  </script>

  <div id="theme-switcher">
    <select id="theme-select" onchange="switchTheme(this.value)">
      <option value="black" selected>black</option>
      <option value="white">white</option>
      <option value="league">league</option>
      <option value="beige">beige</option>
      <option value="sky">sky</option>
      <option value="night">night</option>
      <option value="serif">serif</option>
      <option value="simple">simple</option>
      <option value="solarized">solarized</option>
      <option value="moon">moon</option>
      <option value="dracula">dracula</option>
    </select>
  </div>

  <script>
    function switchTheme(name) {
      const base = 'https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/';
      document.getElementById('theme').setAttribute('href', base + name + '.css');
    }
  </script>
</body>
</html>
