<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centre Director · C-DaRE</title>

  <!--
    All slide content lives in slides.md — edit that file and refresh.
    TO RUN: python3 -m http.server → http://localhost:8000
  -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/black.css" id="theme">

  <style>
    :root {
      --cov-blue:   #0074E7;
      --cov-purple: #2B1C43;
      --cov-mid:    #5B289F;
      --cov-white:  #FFFFFF;
      --t: 0.55s;
    }

    #cov-wordmark {
      position: fixed; top: 16px; right: 24px;
      z-index: 100; pointer-events: none;
    }
    #cov-wordmark img { height: 40px; display: block; }

    .reveal h1, .reveal h2 { color: var(--cov-white); }
    .reveal h3 {
      color: var(--cov-blue);
      font-size: 0.7em; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 0.15em;
    }

    /* ═══════════════════════════════════════════════════════════════════
       DANCING SLIDE
    ═══════════════════════════════════════════════════════════════════ */
    #dancing-slide {
      position: relative;
      width: 100%; height: 100%;
      overflow: visible;
    }

    #word-dancing {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 2em; font-weight: 700;
      color: var(--cov-white);
      white-space: nowrap;
      opacity: 1;
      transition: left var(--t) ease, opacity var(--t) ease;
      pointer-events: none;
    }
    #dancing-slide[data-step="1"] #word-dancing,
    #dancing-slide[data-step="2"] #word-dancing,
    #dancing-slide[data-step="3"] #word-dancing,
    #dancing-slide[data-step="4"] #word-dancing,
    #dancing-slide[data-step="5"] #word-dancing,
    #dancing-slide[data-step="6"] #word-dancing {
      left: 16%; opacity: 0;
    }

    #word-dance {
      position: absolute;
      left: 16%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 2em; font-weight: 700;
      color: var(--cov-white);
      white-space: nowrap;
      opacity: 0;
      transition: opacity var(--t) ease;
    }
    #dancing-slide[data-step="1"] #word-dance,
    #dancing-slide[data-step="2"] #word-dance,
    #dancing-slide[data-step="3"] #word-dance,
    #dancing-slide[data-step="4"] #word-dance,
    #dancing-slide[data-step="5"] #word-dance,
    #dancing-slide[data-step="6"] #word-dance { opacity: 1; }

    #right-panel {
      position: absolute;
      right: 18%; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      gap: 28px; align-items: flex-start;
    }
    .dance-term {
      font-size: 1.4em; font-weight: 600;
      color: var(--cov-white);
      white-space: nowrap;
      opacity: 0;
      transition: opacity var(--t) ease;
    }
    #dancing-slide[data-step="2"] #term-social,
    #dancing-slide[data-step="3"] #term-social,
    #dancing-slide[data-step="4"] #term-social,
    #dancing-slide[data-step="5"] #term-social,
    #dancing-slide[data-step="6"] #term-social { opacity: 1; }

    #dancing-slide[data-step="3"] #term-artistic,
    #dancing-slide[data-step="4"] #term-artistic,
    #dancing-slide[data-step="5"] #term-artistic,
    #dancing-slide[data-step="6"] #term-artistic { opacity: 1; }

    #dancing-slide[data-step="4"] #term-embodiment,
    #dancing-slide[data-step="5"] #term-embodiment,
    #dancing-slide[data-step="6"] #term-embodiment { opacity: 1; }

    #ds-svg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .ds-arrow {
      fill: none;
      stroke: var(--cov-blue);
      stroke-width: 2;
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      transition: stroke-dashoffset 0.5s ease;
      marker-end: none;
    }
    #dancing-slide[data-step="2"] #arrow-social,
    #dancing-slide[data-step="3"] #arrow-social,
    #dancing-slide[data-step="4"] #arrow-social,
    #dancing-slide[data-step="5"] #arrow-social,
    #dancing-slide[data-step="6"] #arrow-social {
      stroke-dashoffset: 0; marker-end: url(#arrowhead);
    }
    #dancing-slide[data-step="3"] #arrow-artistic,
    #dancing-slide[data-step="4"] #arrow-artistic,
    #dancing-slide[data-step="5"] #arrow-artistic,
    #dancing-slide[data-step="6"] #arrow-artistic {
      stroke-dashoffset: 0; marker-end: url(#arrowhead);
    }
    #dancing-slide[data-step="4"] #arrow-embodiment,
    #dancing-slide[data-step="5"] #arrow-embodiment,
    #dancing-slide[data-step="6"] #arrow-embodiment {
      stroke-dashoffset: 0; marker-end: url(#arrowhead);
    }

    .ds-brace {
      fill: none; stroke: rgba(255,255,255,0.75); stroke-width: 1.8;
      opacity: 0; transition: opacity var(--t) ease;
    }
    .ds-label {
      fill: var(--cov-blue); font-size: 30px; font-weight: 700;
      opacity: 0; transition: opacity var(--t) ease;
    }
    #dancing-slide[data-step="5"] #brace-top,
    #dancing-slide[data-step="6"] #brace-top,
    #dancing-slide[data-step="5"] #label-top,
    #dancing-slide[data-step="6"] #label-top { opacity: 1; }

    #dancing-slide[data-step="6"] #brace-bottom,
    #dancing-slide[data-step="6"] #label-bottom { opacity: 1; }

  </style>
</head>

<body>
  <div id="cov-wordmark">
    <img src="cov-logo.png" alt="C-DaRE · Coventry University">
  </div>

  <div class="reveal">
    <div class="slides">
      <section data-markdown="slides.md"
               data-separator="\r?\n---\r?\n"
               data-separator-vertical="\r?\n----\r?\n"
               data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/highlight.js"></script>

  <script>
  (function () {
    var MAX_STEP = 6;
    var slide    = null;
    var step     = 0;

    function setStep(n) {
      step = n;
      slide.setAttribute('data-step', String(n));
    }

    function bracePath(x, y1, y2, curl) {
      var mid = (y1 + y2) / 2;
      var r   = 7;
      curl = curl || 18;
      var cap = 10;
      return [
        'M', x - cap, y1,
        'L', x,       y1,
        'Q', x + r,   y1,     x + r,  y1 + r,
        'L', x + r,   mid - curl * 0.5,
        'Q', x + r,   mid,    x + r + curl, mid,
        'Q', x + r,   mid,    x + r,  mid + curl * 0.5,
        'L', x + r,   y2 - r,
        'Q', x + r,   y2,     x,      y2,
        'L', x - cap, y2
      ].join(' ');
    }

    function toSVG(el, slideEl) {
      var sr     = slideEl.getBoundingClientRect();
      var er     = el.getBoundingClientRect();
      var scaleX = sr.width  / slideEl.offsetWidth;
      var scaleY = sr.height / slideEl.offsetHeight;
      return {
        left:   (er.left   - sr.left) / scaleX,
        right:  (er.right  - sr.left) / scaleX,
        top:    (er.top    - sr.top)  / scaleY,
        bottom: (er.bottom - sr.top)  / scaleY,
        cx:     (er.left   - sr.left + er.width  / 2) / scaleX,
        cy:     (er.top    - sr.top  + er.height / 2) / scaleY,
        w:      er.width  / scaleX,
        h:      er.height / scaleY
      };
    }

    function computeLayout() {
      if (!slide) return;
      var danceEl  = slide.querySelector('#word-dance');
      var socialEl = slide.querySelector('#term-social');
      var artEl    = slide.querySelector('#term-artistic');
      var embEl    = slide.querySelector('#term-embodiment');
      if (!danceEl || !socialEl) { setTimeout(computeLayout, 150); return; }

      [socialEl, artEl, embEl].forEach(function (el) {
        el.style.setProperty('opacity', '1', 'important');
        el.style.visibility = 'hidden';
      });

      var D = toSVG(danceEl,  slide);
      var S = toSVG(socialEl, slide);
      var A = toSVG(artEl,    slide);
      var E = toSVG(embEl,    slide);

      [socialEl, artEl, embEl].forEach(function (el) {
        el.style.removeProperty('opacity');
        el.style.visibility = '';
      });

      if (S.w < 1) { setTimeout(computeLayout, 150); return; }

      var ox = D.right + 10;
      var oy = D.cy;

      function arrowD(tx, ty) {
        var pull = (tx - ox) * 0.5;
        return ['M', ox, oy,
                'C', ox + pull, oy,
                     tx - pull, ty,
                     tx - 10,   ty].join(' ');
      }

      slide.querySelector('#arrow-social')
        .setAttribute('d', arrowD(S.left, S.cy));
      slide.querySelector('#arrow-artistic')
        .setAttribute('d', arrowD(A.left, A.cy));
      slide.querySelector('#arrow-embodiment')
        .setAttribute('d', arrowD(E.left, E.cy));

      var pad    = 8;
      var spineX = Math.max(S.right, A.right, E.right) + 22;
      var lblX   = spineX + 70;

      slide.querySelector('#brace-top')
        .setAttribute('d', bracePath(spineX, S.top - pad, A.bottom + pad, 20));
      var ltEl = slide.querySelector('#label-top');
      ltEl.setAttribute('x', lblX);
      ltEl.setAttribute('y', (S.top + A.bottom) / 2 + 7);

      slide.querySelector('#brace-bottom')
        .setAttribute('d', bracePath(spineX, E.top - pad, E.bottom + pad, 12));
      var lbEl = slide.querySelector('#label-bottom');
      lbEl.setAttribute('x', lblX);
      lbEl.setAttribute('y', E.cy + 7);
    }

    document.addEventListener('keydown', function (e) {
      if (!slide || Reveal.getCurrentSlide() !== slide) return;

      var fwd = e.key === 'ArrowRight' || e.key === 'ArrowDown' ||
                e.key === ' ' || e.key === 'PageDown';
      var bwd = e.key === 'ArrowLeft' || e.key === 'ArrowUp' ||
                e.key === 'PageUp';

      if (fwd && step < MAX_STEP) {
        e.stopImmediatePropagation();
        setStep(step + 1);
      } else if (bwd && step > 0) {
        e.stopImmediatePropagation();
        setStep(step - 1);
      }
    }, true);

    Reveal.initialize({
      hash: true,
      plugins: [RevealMarkdown, RevealNotes, RevealHighlight]
    }).then(function () {

      // Find the dancing slide by looking for its unique marker element
      var marker = document.getElementById('word-dancing');
      if (marker) {
        slide = marker.closest('section');
        slide.setAttribute('id', 'dancing-slide');
        slide.setAttribute('data-step', '0');
        setTimeout(computeLayout, 250);
      }

      Reveal.on('slidechanged', function (e) {
        if (!slide) return;
        if (e.currentSlide === slide) {
          setStep(0);
          setTimeout(computeLayout, 80);
        }
      });
    });

  }());
  </script>
</body>
</html>
