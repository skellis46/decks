<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centre Director · C-DaRE</title>

  <!--
    All slide content lives in slides.md — edit that file and refresh.
    TO RUN: python3 -m http.server → http://localhost:8000
  -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/black.css" id="theme">

  <style>
    :root {
      --cov-blue:   #0074E7;
      --cov-purple: #2B1C43;
      --cov-mid:    #5B289F;
      --cov-white:  #FFFFFF;
    }

    #cov-wordmark {
      position: fixed; top: 16px; right: 24px;
      z-index: 100; pointer-events: none;
    }
    #cov-wordmark img { height: 40px; display: block; }

    .reveal h1, .reveal h2 { color: var(--cov-white); }
    .reveal h3 {
      color: var(--cov-blue);
      font-size: 0.7em; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 0.15em;
    }
  </style>
</head>

<body>
  <div id="cov-wordmark">
    <img src="cov-logo.png" alt="C-DaRE · Coventry University">
  </div>

  <div class="reveal">
    <div class="slides">
      <section data-markdown="slides.md"
               data-separator="\r?\n---\r?\n"
               data-separator-vertical="\r?\n----\r?\n"
               data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/highlight/highlight.js"></script>

  <script>
    Reveal.initialize({
      hash: true,
      plugins: [RevealMarkdown, RevealNotes, RevealHighlight]
    }).then(function () {

      // Make every bullet slide in one at a time (skip speaker-notes lists)
      }).then(function () {

  // Reveal every piece of content one click at a time.
  // The <h2> slide title stays visible; sub-headings, paragraphs
  // and list items all fragment in.
  document.querySelectorAll('.reveal .slides section').forEach(function (section) {
    // skip the container of a vertical stack
    if (section.querySelector(':scope > section')) return;
    // leave any custom animated slide (data-step) untouched
    if (section.hasAttribute('data-step') || section.querySelector('[data-step]')) return;

    Array.prototype.forEach.call(section.children, function (el) {
      if (el.matches('aside.notes')) return;        // speaker notes
      if (el.matches('h1, h2')) return;             // keep the title visible
      if (el.matches('ul, ol')) {
        el.querySelectorAll('li').forEach(function (li) {
          li.classList.add('fragment', 'fade-up');
        });
      } else if (el.matches('h3, h4, p, blockquote, pre')) {
        el.classList.add('fragment', 'fade-up');    // sub-headings and stray text
      }
    });
  });
  Reveal.sync();

    });
  </script>
</body>
</html>
